<!DOCTYPE html>
<html lang="en">
<head>
    <title>Interactive Table Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🔥 Multiplication Table Generator</h1>

    <div class="input-group">
        <input type="number" id="numberInput" placeholder="Enter Number">
        <input type="number" id="limitInput" placeholder="Limit (e.g. 10)">
    </div>

    <div class="buttons">
        <button onclick="generateTable()">Generate</button>
        <button onclick="clearTable()" class="clear">Clear</button>
    </div>

    <div id="result"></div>
</div>
